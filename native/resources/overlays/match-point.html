<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
  html,body{margin:0;height:100%;background:transparent;font-family:"Segoe UI",system-ui,sans-serif;overflow:hidden;}
  .banner{position:absolute;left:50%;top:18%;transform:translateX(-50%);padding:16px 40px;
    background:rgba(10,10,15,.88);border:2px solid #F59E0B;color:#F8F8FF;text-align:center;}
  .label{letter-spacing:6px;font-size:14px;color:#F59E0B;font-weight:800;}
  .big{font-size:56px;font-weight:900;margin-top:4px;}
</style>
</head>
<body>
  <div class="banner">
    <div class="label">MATCH POINT</div>
    <div class="big" id="who">GAME ON THE LINE</div>
  </div>
  <script>
    const p = new URLSearchParams(location.search).get('player');
    if (p) document.getElementById('who').textContent = p.toUpperCase();
  </script>
</body>
</html>
