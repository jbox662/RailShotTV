<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
  html,body{margin:0;height:100%;background:transparent;font-family:"Segoe UI",system-ui,sans-serif;overflow:hidden;}
  .burst{position:absolute;right:36px;top:36px;padding:20px 28px;background:linear-gradient(135deg,#FF4D1C,#b91c1c);
    color:white;border-radius:4px;box-shadow:0 12px 40px rgba(0,0,0,.45);animation:pop .6s ease;}
  .t{font-size:12px;letter-spacing:4px;opacity:.9;font-weight:700;}
  .h{font-size:36px;font-weight:900;margin-top:4px;}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
  <div class="burst">
    <div class="t">ALERT</div>
    <div class="h">BREAK AND RUN</div>
  </div>
</body>
</html>
